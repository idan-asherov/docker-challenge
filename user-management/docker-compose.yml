services:
  app:
    build: .
    ports:
      - "5002:3000"
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      # You might still need a MONGO_URI if your app uses one:
      MONGO_URI: mongodb://mongodb:27017/${DB_NAME}
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
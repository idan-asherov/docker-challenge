version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:3000"
    environment:
      # FIXED: Points to the container service name "mongo" instead of localhost
      - MONGO_URI=mongodb://mongo:27017/docker-challenge
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: